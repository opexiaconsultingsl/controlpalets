<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Dulca · Registro de Palets</title>

<link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<link rel="apple-touch-icon" href="icon-192.png">

<meta name="theme-color" content="#c72724">

  <style>
    :root {
      --dulca-red: #c72724;
      --dulca-red-dark: #8f1d1b;
      --dulca-gold: #e2a12a;
      --bg: #f7f3ed;
      --text: #231f20;
      --muted: #6b5f58;
      --white: #ffffff;
      --border: #eadfce;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fff7eb 0%, var(--bg) 100%);
      color: var(--text);
    }

    .app {
      max-width: 1050px;
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      background: var(--white);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      box-shadow: 0 14px 35px rgba(143, 29, 27, .12);
      border: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand img {
      width: 190px;
      max-width: 42vw;
      height: auto;
      display: block;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      color: var(--dulca-red-dark);
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .status {
      padding: 10px 16px;
      border-radius: 999px;
      background: #fee2e2;
      color: var(--dulca-red-dark);
      font-weight: 800;
      white-space: nowrap;
    }

    .status.online {
      background: #dcfce7;
      color: #166534;
    }

    .card {
      background: var(--white);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 28px rgba(70, 42, 20, .08);
    }

    h2 {
      margin: 0 0 16px;
      color: var(--dulca-red-dark);
      font-size: 22px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 7px;
      font-weight: 750;
      color: var(--text);
    }

    input,
    select {
      width: 100%;
      padding: 13px 14px;
      border-radius: 13px;
      border: 1px solid #d9c9b3;
      font-size: 16px;
      background: #fffdfa;
    }

    input:focus,
    select:focus {
      outline: 3px solid rgba(226, 161, 42, .28);
      border-color: var(--dulca-gold);
    }

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin: 20px 0 12px;
    }

    .section-head h3 {
      margin: 0;
      color: var(--dulca-red-dark);
    }

    .line {
      display: grid;
      grid-template-columns: 1fr 160px auto;
      gap: 12px;
      align-items: end;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #fffaf2;
      margin-bottom: 12px;
    }

    button {
      border: 0;
      border-radius: 13px;
      padding: 13px 17px;
      font-weight: 850;
      cursor: pointer;
      font-size: 15px;
      transition: .2s;
    }

    .primary {
      background: var(--dulca-red);
      color: white;
      box-shadow: 0 8px 18px rgba(199, 39, 36, .22);
    }

    .primary:hover {
      background: var(--dulca-red-dark);
    }

    .secondary {
      background: var(--dulca-gold);
      color: #3b2600;
    }

    .secondary:hover {
      filter: brightness(.96);
    }

    .danger {
      background: #fee2e2;
      color: var(--dulca-red-dark);
    }

    .danger:hover {
      background: #fecaca;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .pending-item {
      background: #fffaf2;
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 13px;
      margin-bottom: 10px;
    }

    .muted {
      color: var(--muted);
      margin: 0;
    }

    @media (max-width: 1000px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .line {
        grid-template-columns: 1fr;
      }

      .topbar,
      .brand,
      .section-head {
        flex-direction: column;
        align-items: stretch;
      }

      .brand img {
        width: 170px;
      }
    }

    #versionInfo {
  position: fixed;
  bottom: 6px;
  right: 10px;
  font-size: 11px;
  color: #999;
  opacity: 0.8;
  z-index: 9999;
}

    
  </style>
</head>

<body>

  <main class="app">

    <header class="topbar">
      <div class="brand">
        <img src="Logo Dulca Familiar_Mesa de trabajo.png" alt="Dulca">

        <div>
          <h1>Registro de Palets</h1>
          <p>Control de movimientos de palets LPR y CHEP</p>
        </div>
      </div>

      <div id="status" class="status">
        Offline
      </div>
    </header>

    <section class="card">

      <h2>Nuevo movimiento</h2>

      <form id="form">

        <div class="grid">
<label>
  Fecha documento
  <input id="fechaDocumento" type="date" required>
</label>

<label>
  Nº de Albarán
  <input
    id="numeroAlbaran"
    type="text"
    placeholder="Ej: ALB-2026-001"
    required
  >
</label>

<label>
  Operación
  <select id="operacion" required>
    <option value="" selected disabled>Selecciona operación</option>
    <option value="Descarga">Descarga</option>
    <option value="Carga">Carga</option>
    <option value="Devolución">Devolución</option>
  </select>
</label>

<label>
  Responsable
  <input
    id="responsable"
    list="responsablesList"
    type="text"
    placeholder="Selecciona o escribe"
    required
  >

  <datalist id="responsablesList">
    <option value="Alberto Gómez">
    <option value="Alberto Santamaría">
    <option value="Edu">
    <option value="David García">
    <option value="David Salinero">
    <option value="Marcelino">
    <option value="Héctor">
    <option value="Iván Fraile">
    <option value="Iván">
    <option value="Alba">
    <option value="Amanda">
    <option value="Jose">
  </datalist>
</label>

<label>
  Creado en
  <select id="origen" required>
    <option value="Dulca" selected>Dulca</option>
    <option value="Autroestrela">Autroestrela</option>
  </select>
</label>

<label>
  Lugar
  <input
    id="origenDestino"
    type="text"
    placeholder="Cliente / Origen / Destino"
    required
  >
</label>

          
        </div>

        <div class="section-head">
          <h3>Tipos de palet</h3>

          <button
            type="button"
            class="secondary"
            id="addLine"
          >
            ➕ Añadir tipo
          </button>
        </div>

        <div id="lines"></div>

        <div class="actions">

          <button type="submit" class="primary">
            💾 Guardar movimiento
          </button>

          <button
            type="button"
            class="secondary"
            id="syncNow"
          >
            🔄 Sincronizar
          </button>

        </div>

      </form>

    </section>

    <section class="card">

      <h2>Pendientes de sincronizar</h2>

      <p class="muted">
        <strong id="pendingCount">0</strong>
        registros guardados localmente.
      </p>

      <div id="pendingList"></div>

    </section>

  </main>

  <template id="lineTemplate">

    <div class="line">

      <label>
        Tipo de palet
        <select class="tipoPalet" required></select>
      </label>

      <label>
        Cantidad
        <input
          class="cantidad"
          type="number"
          min="1"
          step="1"
          required
        >
      </label>

      <button
        type="button"
        class="danger removeLine"
      >
        🗑️ Eliminar
      </button>

    </div>

  </template>

<div id="versionInfo"></div>
  
  
  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYQapL6YBZYKvK8yoPrdXA9IzPhSsqEKWf0M4o9WR4IR8MpdWS2byiJRb4ea3v6iQRVw/exec";

    const PALET_TYPES = [
      "LPR 80x120 madera",
      "LPR 100x120 madera BH",
      "LPR quarter palets",
      "80x60 Dusseldorf",
      "Chep 80x120 madera",
      "Chep 80x120 plástico",
      "Chep 100x120 plástico",
      "Chep 100x120 madera",
      "Chep quarter 40x60"
    ];

    const STORAGE_QUEUE = "dulca_palets_queue_v1";

    const APP_VERSION = "1.0.0";


    const form = document.getElementById("form");
    const lines = document.getElementById("lines");
    const template = document.getElementById("lineTemplate");
    const statusEl = document.getElementById("status");
    const pendingCount = document.getElementById("pendingCount");
    const pendingList = document.getElementById("pendingList");

    function getQueue() {
      return JSON.parse(localStorage.getItem(STORAGE_QUEUE) || "[]");
    }

    function setQueue(queue) {
      localStorage.setItem(STORAGE_QUEUE, JSON.stringify(queue));
      renderPending();
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function addPaletLine() {
      const node = template.content.cloneNode(true);
      const select = node.querySelector(".tipoPalet");



        const defaultOption = document.createElement("option");
defaultOption.value = "";
defaultOption.textContent = "Seleccione palet";
defaultOption.disabled = true;
defaultOption.selected = true;
select.appendChild(defaultOption);

PALET_TYPES.forEach(type => {
  const option = document.createElement("option");
  option.value = type;
  option.textContent = type;
  select.appendChild(option);
});

      

      node.querySelector(".removeLine").addEventListener("click", event => {
        if (lines.children.length <= 1) return;
        event.target.closest(".line").remove();
      });

      lines.appendChild(node);
    }


    function updateStatus() {
      const online = navigator.onLine;

      statusEl.textContent = online
        ? "🟢 Online"
        : "🔴 Sin conexión";

      statusEl.classList.toggle("online", online);
    }

    function renderPending() {
      const queue = getQueue();

      pendingCount.textContent = queue.length;

      if (!queue.length) {
        pendingList.innerHTML =
          "<p class='muted'>No hay registros pendientes.</p>";
        return;
      }

      pendingList.innerHTML = queue.map(item => `
        <div class="pending-item">
          <strong>
            ${escapeHtml(item.fechaDocumento)}
            · Alb. ${escapeHtml(item.numeroAlbaran)}
· ${escapeHtml(item.operacion)}
· ${escapeHtml(item.responsable)}
· ${escapeHtml(item.origen)}
· ${escapeHtml(item.origenDestino)}
          </strong>
          <br>
          ${escapeHtml(item.tipoPalet)}
          · Cantidad: ${escapeHtml(item.cantidad)}
        </div>
      `).join("");
    }

    function buildRecords() {
      const fechaDocumento =
        document.getElementById("fechaDocumento").value;

      const numeroAlbaran =
        document.getElementById("numeroAlbaran").value.trim();

      const origenDestino =
        document.getElementById("origenDestino").value.trim();

      const operacion =
        document.getElementById("operacion").value;

      const responsable =
  document.getElementById("responsable").value.trim();

const origen =
  document.getElementById("origen").value;

      const movementId = crypto.randomUUID();
      const createdAt = new Date().toISOString();

      return [...document.querySelectorAll(".line")]
.map(line => ({
  id: crypto.randomUUID(),
  movementId,
  fechaDocumento,
  numeroAlbaran,
  origenDestino,
  operacion,
  responsable,
  origen,
  tipoPalet: line.querySelector(".tipoPalet").value,
  cantidad: Number(line.querySelector(".cantidad").value),
  createdAt,
  syncedAt: ""
}))
    .filter(record =>
  record.fechaDocumento &&
  record.numeroAlbaran &&
  record.origenDestino &&
  record.operacion &&
  record.responsable &&
  record.origen &&
  record.tipoPalet &&
  Number.isFinite(record.cantidad) &&
  record.cantidad > 0
);
    }

    async function syncQueue() {
      if (!APPS_SCRIPT_URL) return;
      if (!navigator.onLine) return;

      const queue = getQueue();

      if (!queue.length) return;

      const failed = [];

      for (const record of queue) {
        try {
 await fetch(APPS_SCRIPT_URL, {
  method: "POST",
  mode: "no-cors",
  headers: {
    "Content-Type": "text/plain;charset=utf-8"
  },
  body: JSON.stringify({
    ...record,
    syncedAt: new Date().toISOString()
  })
});

historicoAlbaranes.add(
  normalizarAlbaran(record.numeroAlbaran)
);
        } catch {
          failed.push(record);
        }
      }

      setQueue(failed);
    }



    async function comprobarVersionApp() {
  try {
    if (!navigator.onLine) return;

    const response = await fetch(APPS_SCRIPT_URL + "?action=version&t=" + Date.now());
    const data = await response.json();

if (data.version && data.version !== APP_VERSION) {

  if ("caches" in window) {
    const keys = await caches.keys();

    for (const key of keys) {
      await caches.delete(key);
    }
  }

  document.body.innerHTML = `
    <div style="
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      text-align:center;
      padding:30px;
      font-family:sans-serif;
    ">
      <div>
        <h2>Aplicación actualizada</h2>
        <p>Existe una nueva versión (${data.version}).</p>
        <p>Cierre completamente la aplicación y vuelva a abrirla.</p>
      </div>
    </div>
  `;

  return;
}
  } catch (error) {
    console.warn("No se pudo comprobar la versión de la app", error);
  }
}

form.addEventListener("submit", async event => {
  event.preventDefault();

  const records = buildRecords();

  if (!records.length) return;

  // NUEVO BLOQUE
  if (!historicoCargado) {

    const continuar = confirm(
      "No se ha podido cargar el histórico de albaranes. La comprobación de duplicados puede no ser fiable. ¿Desea continuar?"
    );

    if (!continuar) return;
  }

  const numeroAlbaran = normalizarAlbaran(records[0].numeroAlbaran);

const duplicadoHistorico =
  historicoAlbaranes.has(numeroAlbaran);

const duplicadoServidor =
  await existeAlbaranServidor(numeroAlbaran);

const duplicadoPendiente =
  getQueue().some(item =>
    normalizarAlbaran(item.numeroAlbaran) === numeroAlbaran
  );

if (
  duplicadoHistorico ||
  duplicadoPendiente ||
  duplicadoServidor
) {
    const confirmar = confirm(
      "Advertencia: nº de albarán duplicado. ¿Seguro que desea registrarlo?"
    );

    if (!confirmar) return;
  }

  setQueue([
    ...getQueue(),
    ...records
  ]);

  form.reset();

  document.getElementById("fechaDocumento").value =
    new Date().toISOString().slice(0, 10);

  lines.innerHTML = "";

  addPaletLine();

  if (navigator.onLine) {
    syncQueue();
  }
});



   
let historicoAlbaranes = new Set();

let historicoCargado = false;

function normalizarAlbaran(value) {
  return String(value ?? "")
    .trim()
    .toUpperCase()
    .replace(/\s+/g, "");
}

async function cargarHistoricoAlbaranes() {
  try {
    const response = await fetch(
      APPS_SCRIPT_URL + "?action=albaranes&t=" + Date.now()
    );

    const data = await response.json();

    if (!data.ok) {
      throw new Error("Respuesta no válida del histórico");
    }

    historicoAlbaranes = new Set(
      data.albaranes
        .map(normalizarAlbaran)
        .filter(Boolean)
    );

    historicoCargado = true;

    statusEl.textContent = "🟢 Online";
    statusEl.classList.add("online");

  } catch (error) {
    historicoCargado = false;

    statusEl.textContent = "⚠️ Histórico no cargado";
    statusEl.classList.remove("online");

    console.error(error);
  }
}


async function existeAlbaranServidor(numeroAlbaran) {

  if (!navigator.onLine) return false;

  const response = await fetch(
    APPS_SCRIPT_URL +
    "?action=existeAlbaran&numero=" +
    encodeURIComponent(numeroAlbaran)
  );

  const data = await response.json();

  return !!data.existe;
}
    
    document
  .getElementById("addLine")
  .addEventListener("click", addPaletLine);

document
  .getElementById("syncNow")
  .addEventListener("click", syncQueue);

window.addEventListener("online", () => {
  updateStatus();
  syncQueue();
});

window.addEventListener("offline", updateStatus);

document.getElementById("fechaDocumento").value =
  new Date().toISOString().slice(0, 10);

addPaletLine();
renderPending();
updateStatus();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
    
document.getElementById("versionInfo").textContent =
  "v" + APP_VERSION;

    
    comprobarVersionApp();
    cargarHistoricoAlbaranes();
  </script>

  
</body>
</html>
